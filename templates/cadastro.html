<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
    <main>
        <div class="card">
            <div class="brand">
                <a href="{{ url_for('home') }}" style="text-decoration: none;">
                    <h1 class="app-name">Criar Conta</h1>
                </a>
            </div>

            <form id="formCadastro" action="{{ url_for('login') }}">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome" required />

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu.email@exemplo.com" required />

                <label for="senha">Senha (mín. 8 caracteres)</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required
                    minlength="8" />

                <label for="confirmarSenha">Confirmar Senha</label>
                <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Repita a senha" required
                    minlength="8" />

                <p id="erro" class="erro"></p>

                <button type="submit" class="btn primary" onclick=def home>Cadastrar</button>

                <p class="muted">
                    Já tem uma conta? <a href="{{ url_for('login') }}">Fazer Login</a>
                </p>
            </form>
        </div>
    </main>

    <script src="/static/script.js"> </script>
</body>

</html>
